<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>500 - Server Error</title>
    <style>
        :root {
            color-scheme: light;
            --page-bg: #eef3f5;
            --panel-bg: rgba(255, 255, 255, 0.92);
            --panel-border: rgba(32, 52, 64, 0.12);
            --title: #18303d;
            --text: #4e6270;
            --accent: #2d6a73;
            --accent-strong: #23545b;
            --shadow: 0 24px 60px rgba(21, 39, 48, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--title);
            background:
                radial-gradient(circle at top left, rgba(45, 106, 115, 0.18), transparent 34%),
                radial-gradient(circle at bottom right, rgba(214, 168, 111, 0.2), transparent 30%),
                linear-gradient(160deg, #dfe7eb 0%, var(--page-bg) 48%, #f7fafb 100%);
        }

        .error-shell {
            width: min(100%, 720px);
            padding: 40px 32px;
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            background: var(--panel-bg);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 12px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
        }

        h1 {
            margin: 0;
            font-size: clamp(2.5rem, 8vw, 4.6rem);
            line-height: 1;
        }

        h2 {
            margin: 14px 0 0;
            font-size: clamp(1.35rem, 4vw, 2rem);
            font-weight: 700;
        }

        p {
            max-width: 34rem;
            margin: 18px auto 0;
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text);
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 28px;
            padding: 14px 24px;
            border-radius: 999px;
            background: var(--accent);
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .home-link:hover,
        .home-link:focus {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }

        @media (max-width: 575.98px) {
            body {
                padding: 16px;
            }

            .error-shell {
                padding: 32px 22px;
                border-radius: 20px;
            }

            .home-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="error-shell">
        <p class="eyebrow">Server Error</p>
        <h1>500</h1>
        <h2>500 - Server Error</h2>
        <p>Sorry, something went wrong on our side. Please try again in a moment or return to the homepage.</p>
        <a class="home-link" href="{% url 'home' %}">Back to Homepage</a>
    </main>
</body>
</html>
