{% extends "base.html" %}

{% block content %}

<div class="glass-panel p-4 p-lg-5 reveal">
    <div class="section-kicker mb-2">Confirm</div>
    <h2 class="mb-3">Delete Report</h2>

    <p>Are you sure you want to delete:</p>

    <h4 class="mb-4">{{ object.title }}</h4>

    <form method="post" class="form-stack">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">
                Confirm Delete
            </button>
            {% if request.GET.next %}
                <a href="{{ request.GET.next }}" class="btn btn-secondary">Cancel</a>
            {% else %}
                <a href="{% url 'reports:details' object.pk object.slug %}" class="btn btn-secondary">Cancel</a>
            {% endif %}
        </div>
    </form>
</div>

{% endblock %}
