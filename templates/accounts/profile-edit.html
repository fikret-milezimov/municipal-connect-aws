{% extends "base.html" %}

{% block content %}

<div class="glass-panel p-4 p-lg-5 reveal">
    <div class="section-kicker mb-2">Update Profile</div>
    <h2 class="mb-3">Edit Your Profile</h2>
    <p class="text-muted mb-4">
        Keep your public details current so neighbors can recognize and trust your account.
    </p>

    <form method="post" enctype="multipart/form-data" class="form-stack form-grid">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
